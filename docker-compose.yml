services:
  transcription:
    build: .
    ports:
      - "8000:8000"
    environment:
      - WHISPER_MODEL=tiny
      - WHISPER_CPU_THREADS=2
    volumes:
      - ./uploads:/app/uploads
      - whisper_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G

volumes:
  whisper_cache:
